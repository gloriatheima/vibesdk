name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache TypeScript build info
        uses: actions/cache@v4
        with:
          path: |
            **/*.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('tsconfig*.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'worker/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-${{ hashFiles('tsconfig*.json') }}-
            tsbuildinfo-${{ runner.os }}-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npx tsc -b --incremental & npx vite build & wait

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: fcaaec845fe02e091365a0103ea4b97f
